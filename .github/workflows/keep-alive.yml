name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 */8 * * *' # Runs every 8 hours
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # Use both secrets and vars to minimize setup confusion
          # Use existing URL/KEY if set, otherwise fallback to vars
          URL="${{ secrets.SUPABASE_URL }}"
          if [ -z "$URL" ]; then URL="${{ vars.SUPABASE_URL }}"; fi
          
          KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          if [ -z "$KEY" ]; then KEY="${{ vars.SUPABASE_ANON_KEY }}"; fi

          if [ -z "$URL" ]; then
            echo "::error::SUPABASE_URL is missing! Ensure it is in 'Repository secrets' or 'Variables' (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY is missing! Ensure it is in 'Repository secrets' or 'Variables' (Settings > Secrets and variables > Actions)."
            exit 1
          fi

          # Use PATCH to update the timestamp. Targeting id=1 as it is the standard singleton row.
          # Note: If using the anon key, you MUST have an RLS policy allowing UPDATE on this table.
          curl -X PATCH "$URL/rest/v1/keep_alive?id=eq.1" \
          -H "apikey: $KEY" \
          -H "Authorization: Bearer $KEY" \
          -H "Content-Type: application/json" \
          -d "{\"last_ping\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
