name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # Use both secrets and vars to minimize setup confusion
          URL="${{ secrets.SUPABASE_URL }}${{ vars.SUPABASE_URL }}"
          KEY="${{ secrets.SUPABASE_ANON_KEY }}${{ vars.SUPABASE_ANON_KEY }}"

          if [ -z "$URL" ]; then
            echo "::error::SUPABASE_URL is missing! Ensure it is in 'Repository secrets' or 'Variables' (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          if [ -z "$KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY is missing! Ensure it is in 'Repository secrets' or 'Variables' (Settings > Secrets and variables > Actions)."
            exit 1
          fi

          curl -X GET "$URL/rest/v1/keep_alive?select=*" \
          -H "apikey: $KEY" \
          -H "Authorization: Bearer $KEY"
